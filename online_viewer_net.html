<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
    }
    .card {
      background: #fff;
      margin: 50px auto;
      padding: 25px;
      max-width: 400px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 {
      color: #e91e63;
    }
    .details {
      margin-top: 20px;
      font-size: 18px;
    }
    .footer {
      margin-top: 20px;
      font-style: italic;
      color: #777;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #e91e63;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      background: #c2185b;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>✨ You're Invited ✨</h1>
    
    <p>With great joy, we invite you to our special occasion 💖</p>

    <div class="details">
      <p><b>Event:</b> [Event Name]</p>
      <p><b>Date:</b> [Date]</p>
      <p><b>Time:</b> [Time]</p>
      <p><b>Venue:</b> [Location]</p>
    </div>

    <button onclick="alert('Thank you for joining! 🎉')">Confirm حضور</button>

    <div class="footer">
      – [Your Name / Family]
    </div>
  </div>

</body>
</html>
